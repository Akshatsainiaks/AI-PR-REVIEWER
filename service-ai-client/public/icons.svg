// service-ai-backend/src/config/redis.js

const Redis = require("ioredis");
require("dotenv").config();

const redisConfig = {
  host: process.env.REDIS_HOST || "localhost",
  port: process.env.REDIS_PORT || 6379,
};

if (process.env.REDIS_PASSWORD) {
  redisConfig.password = process.env.REDIS_PASSWORD;
}

if (process.env.REDIS_TLS === "true") {
  redisConfig.tls = {};
}

const redis = new Redis(redisConfig);

redis.on("connect", () => {
  console.log("Redis connected 🚀");
});

redis.on("error", (err) => {
  console.error("Redis error ❌", err);
});

module.exports = redis;

// service-ai-backend/src/controllers/auth.controller.js

const bcrypt = require("bcrypt");
const { nanoid } = require("nanoid");
const prisma = require("../config/prisma");
const redis = require("../config/redis");
const logger = require("../utils/logger");
const { sendOTP } = require("../services/otp.service");

exports.register = async (req, res) => {
  try {
    const { fullName, name, firstName, lastName, email, password } = req.body;
    const otp = await sendOTP(email);
    const hashedPassword = await bcrypt.hash(password, 10);
    const finalName = fullName || name || `${firstName || ""} ${lastName || ""}`;
    const user = await prisma.user.create({
      data: {
        id: nanoid(),
        email: email.toLowerCase(),
        password: hashedPassword,
        role: 0,
        fullName: finalName,
      },
    });
    if (process.env.NODE_ENV === "development") {
      console.log("👽 User registered", user);
    }
    res.status(201).json(user);
    return;
  } catch (err) {
    if (process.env.NODE_ENV === "development") {
      console.error("🚨 Error registering user:", err);
    }
    res.status(500).json({ message: "Something went wrong." });
  }
};

// service-ai-backend/src/controllers/auth.controller.js

module.exports = register;